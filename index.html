<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中清店12生肖戰報</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; margin: 0; height: 100vh; overflow: hidden; }
        #root { height: 100%; display: flex; flex-direction: column; }
        /* 隱藏原生 input number 的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; text-align: right; }
        /* 自訂捲軸 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .tab-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 修正：加入 type="text/babel" 並使用 data-type="module" 以支援 Firebase 模組與 React JSX 編譯 -->
    <script type="text/babel" data-type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB6XN-DEpUi4L9jETKpZWZhVrQw7tV4M5E",
            authDomain: "akpi-e0698.firebaseapp.com",
            projectId: "akpi-e0698",
            storageBucket: "akpi-e0698.firebasestorage.app",
            messagingSenderId: "446898815193",
            appId: "1:446898815193:web:f8e38b569ed64f4f0b3ec8",
            measurementId: "G-DKGZD88XER"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 使用符合 Immersive 安全規範的路徑
        const safeCollectionPath = 'artifacts/akpi-e0698/public/data';
        const recordsDocRef = doc(db, safeCollectionPath, 'records');
        const settingsDocRef = doc(db, safeCollectionPath, 'settings');

        const { useState, useMemo, useEffect, useRef } = React;

        const ITEM_CONFIG = [
            { id: 'chickenSoup', name: '雞湯單點', type: 'count', unit: '數量', defaultRate: 15, defaultScore: 2, color: 'rgb(249, 115, 22)' }, // orange
            { id: 'essence', name: '滴雞精', type: 'count', unit: '單數', defaultRate: 5, defaultScore: 2, color: 'rgb(139, 69, 19)' }, // saddlebrown
            { id: 'setMeal', name: '套餐', type: 'count', unit: '單數', defaultRate: 12, defaultScore: 2, color: 'rgb(59, 130, 246)' }, // blue
            { id: 'fascia', name: '筋膜', type: 'amount', unit: '金額', defaultRate: 7, defaultScore: 2, color: 'rgb(168, 85, 247)' }, // purple
            { id: 'review', name: '評論', type: 'count', unit: '則數', defaultRate: 10, defaultScore: 1, color: 'rgb(234, 179, 8)' }, // yellow
            { id: 'app', name: '會員APP', type: 'count', unit: '單數', defaultRate: 6, defaultScore: 1, color: 'rgb(34, 197, 94)' } // green
        ];

        function App() {
            // 系統狀態
            const [activeTab, setActiveTab] = useState('night'); 
            const [isSaving, setIsSaving] = useState(false);
            const [isAuth, setIsAuth] = useState(false);
            const chartRef = useRef(null);

            // 取得今日日期字串 YYYY-MM-DD
            const getTodayStr = () => {
                const today = new Date();
                return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            };
            const [currentDate, setCurrentDate] = useState(getTodayStr());

            // 趨勢圖表與累加查詢狀態
            const [trendMonth, setTrendMonth] = useState(getTodayStr().substring(0, 7)); // YYYY-MM
            const [trendShiftFilter, setTrendShiftFilter] = useState('all'); 
            const [chartTargetItem, setChartTargetItem] = useState('chickenSoup'); 
            
            // 三班累加查詢模式
            const [summaryMode, setSummaryMode] = useState('month'); 

            // 店長設定 
            const [settings, setSettings] = useState({
                rates: ITEM_CONFIG.reduce((acc, item) => ({ ...acc, [item.id]: item.defaultRate }), {}),
                scores: ITEM_CONFIG.reduce((acc, item) => ({ ...acc, [item.id]: item.defaultScore }), {}),
                baseScore: 55
            });

            // 每日紀錄資料庫 (新增 manager 節點供店長稽核使用)
            const initialShiftData = {
                orders: '', revenue: '',
                chickenSoup: '', essence: '', setMeal: '', fascia: '', review: '', app: ''
            };
            const [dailyRecords, setDailyRecords] = useState({});

            // 載入當日編輯區資料，並確保所有班別物件都絕對存在 (防止部分班別資料缺失導致的白畫面)
            const rawDayData = dailyRecords[currentDate] || {};
            const currentDayData = {
                morning: rawDayData.morning || { ...initialShiftData },
                evening: rawDayData.evening || { ...initialShiftData },
                night: rawDayData.night || { ...initialShiftData },
                manager: rawDayData.manager || { ...initialShiftData }
            };

            // Firebase 初始化與即時監聽
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        await signInAnonymously(auth);
                        setIsAuth(true);

                        onSnapshot(settingsDocRef, (docSnap) => {
                            if (docSnap.exists()) {
                                setSettings(prev => ({ ...prev, ...docSnap.data() }));
                            }
                        });

                        onSnapshot(recordsDocRef, (docSnap) => {
                            if (docSnap.exists()) {
                                setDailyRecords(docSnap.data() || {});
                            }
                        });
                    } catch (error) {
                        console.error("Firebase Auth/Data Error:", error);
                    }
                };
                initFirebase();
            }, []);

            // 儲存資料到 Firebase
            const saveRecordToCloud = async (newData) => {
                if (!isAuth) return;
                setIsSaving(true);
                try {
                    await setDoc(recordsDocRef, newData, { merge: true });
                } catch (error) {
                    console.error("Save Record Error:", error);
                }
                setIsSaving(false);
            };

            const saveSettingsToCloud = async (newSettings) => {
                if (!isAuth) return;
                try {
                    await setDoc(settingsDocRef, newSettings, { merge: true });
                } catch (error) {
                    console.error("Save Settings Error:", error);
                }
            };

            // 處理班別或店長資料變更
            const handleShiftChange = (shift, field, value) => {
                const parsedValue = value === '' ? '' : Number(value);
                
                const updatedDayData = {
                    ...currentDayData,
                    [shift]: { ...currentDayData[shift], [field]: parsedValue }
                };

                const updatedRecords = {
                    ...dailyRecords,
                    [currentDate]: updatedDayData
                };
                
                setDailyRecords(updatedRecords);
                saveRecordToCloud({ [currentDate]: updatedDayData });
            };

            const handleSettingChange = (category, field, value) => {
                const newSettings = {
                    ...settings,
                    [category]: { ...settings[category], [field]: Number(value) || 0 }
                };
                setSettings(newSettings);
                saveSettingsToCloud(newSettings);
            };

            const calculateTarget = (data, itemId) => {
                const rate = settings.rates[itemId] || 0;
                const config = ITEM_CONFIG.find(i => i.id === itemId);
                const baseValue = config.type === 'amount' ? (Number(data.revenue)||0) : (Number(data.orders)||0);
                return Math.ceil(baseValue * (rate / 100));
            };

            const formatGap = (actual, target) => {
                if (actual === '' && target === 0) return '';
                const actNum = Number(actual) || 0;
                const gap = actNum - target;
                if (gap > 0) return `+${gap}`;
                return gap;
            };

            const getDaysInMonth = (yearMonthStr) => {
                const [year, month] = yearMonthStr.split('-');
                return new Date(year, month, 0).getDate();
            };

            const isWeekend = (yearMonthStr, day) => {
                const [year, month] = yearMonthStr.split('-');
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay();
                return dayOfWeek === 0 || dayOfWeek === 6;
            };

            const getSummaryData = () => {
                const summary = { ...initialShiftData, atv: 0 };
                Object.keys(summary).forEach(k => summary[k] = 0);

                let targetRecords = {};
                let targetDateStr = currentDate; 

                if (summaryMode === 'day') {
                    targetRecords = { [currentDate]: dailyRecords[currentDate] };
                } else if (summaryMode === 'month') {
                    const currentMonthStr = currentDate.substring(0, 7);
                    Object.keys(dailyRecords).forEach(date => {
                        if (date.startsWith(currentMonthStr)) {
                            targetRecords[date] = dailyRecords[date];
                        }
                    });
                    targetDateStr = `${currentMonthStr} 月累計`;
                } else if (summaryMode === 'lastMonth') {
                    const dateObj = new Date(currentDate);
                    dateObj.setMonth(dateObj.getMonth() - 1);
                    const lastMonthStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
                    Object.keys(dailyRecords).forEach(date => {
                        if (date.startsWith(lastMonthStr)) {
                            targetRecords[date] = dailyRecords[date];
                        }
                    });
                    targetDateStr = `${lastMonthStr} 月累計`;
                }

                Object.values(targetRecords).forEach(dayData => {
                    if(!dayData) return;
                    ['night', 'morning', 'evening'].forEach(s => {
                        if(dayData[s]) {
                            Object.keys(initialShiftData).forEach(key => {
                                summary[key] += (Number(dayData[s][key]) || 0);
                            });
                        }
                    });
                });
                
                summary.atv = summary.orders > 0 ? Math.round(summary.revenue / summary.orders) : 0;
                return { summary, targetDateStr };
            };


            useEffect(() => {
                if (activeTab === 'trend' && chartTargetItem) {
                    const ctx = document.getElementById('trendChart');
                    if (!ctx) return;

                    const days = getDaysInMonth(trendMonth);
                    const labels = Array.from({length: days}, (_, i) => `${i + 1}`);
                    
                    const itemData = [];
                    const config = ITEM_CONFIG.find(i => i.id === chartTargetItem);

                    for (let i = 1; i <= days; i++) {
                        const dateStr = `${trendMonth}-${String(i).padStart(2, '0')}`;
                        const dayData = dailyRecords[dateStr];
                        
                        if (!dayData) {
                            itemData.push(null);
                            continue;
                        }

                        let val = 0;
                        let hasData = false;
                        if (trendShiftFilter === 'all') {
                            ['night', 'morning', 'evening'].forEach(s => {
                                if(dayData[s] && dayData[s][chartTargetItem] !== '') {
                                    val += Number(dayData[s][chartTargetItem]);
                                    hasData = true;
                                }
                            });
                        } else {
                            if(dayData[trendShiftFilter] && dayData[trendShiftFilter][chartTargetItem] !== '') {
                                val = Number(dayData[trendShiftFilter][chartTargetItem]);
                                hasData = true;
                            }
                        }
                        itemData.push(hasData ? val : null);
                    }

                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }

                    chartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: config.name,
                                data: itemData,
                                borderColor: config.color,
                                backgroundColor: config.color,
                                tension: 0.1,
                                spanGaps: false 
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'top' }
                            },
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }
            }, [activeTab, trendMonth, trendShiftFilter, chartTargetItem, dailyRecords]);


            const renderShiftTab = (shiftKey, shiftName, icon, colorClass, bgColorClass) => {
                const data = currentDayData[shiftKey];
                const atv = data.orders > 0 ? Math.round(data.revenue / data.orders) : 0;
                const displayDate = `${currentDate.split('-')[1]}/${currentDate.split('-')[2]}`;

                return (
                    <div className="tab-content h-full flex flex-col md:flex-row p-2 gap-2">
                        {/* 左側輸入區 */}
                        <div className="w-full md:w-1/3 bg-white p-3 rounded-lg shadow border flex flex-col">
                            <h3 className={`text-lg font-bold mb-3 pb-2 border-b ${colorClass}`}><i className={`fa-solid ${icon} mr-1`}></i>數據輸入區</h3>
                            
                            <div className="grid grid-cols-2 gap-2 mb-3">
                                <div>
                                    <label className="block text-xs text-gray-500 mb-1">來客數</label>
                                    <input type="number" className="w-full p-1.5 border rounded bg-gray-50 text-sm font-bold" 
                                        value={data.orders} onChange={(e) => handleShiftChange(shiftKey, 'orders', e.target.value)} placeholder="0" />
                                </div>
                                <div>
                                    <label className="block text-xs text-gray-500 mb-1">總業績</label>
                                    <input type="number" className="w-full p-1.5 border rounded bg-gray-50 text-sm font-bold" 
                                        value={data.revenue} onChange={(e) => handleShiftChange(shiftKey, 'revenue', e.target.value)} placeholder="0" />
                                </div>
                            </div>
                            
                            <div className="space-y-2 overflow-y-auto flex-1 pr-1">
                                {ITEM_CONFIG.map(item => (
                                    <div key={item.id} className="flex justify-between items-center bg-gray-50 p-1.5 rounded border">
                                        <span className="text-sm font-semibold text-gray-700 w-16">{item.name}</span>
                                        <input type="number" className="w-16 p-1 border border-blue-200 rounded text-sm text-blue-700 font-bold bg-white" 
                                            value={data[item.id]} onChange={(e) => handleShiftChange(shiftKey, item.id, e.target.value)} placeholder="-" />
                                    </div>
                                ))}
                            </div>
                            <div className="mt-2 text-xs text-gray-400 text-center flex items-center justify-center">
                                {isSaving ? <><i className="fa-solid fa-spinner fa-spin mr-1"></i> 儲存中...</> : <><i className="fa-solid fa-cloud-check mr-1 text-green-500"></i> 已雲端同步</>}
                            </div>
                        </div>

                        {/* 右側戰報卡片 */}
                        <div className="w-full md:w-2/3 bg-white p-4 rounded-lg shadow border flex flex-col relative" id="screenshot-area">
                            <div className={`absolute top-0 left-0 w-full h-1 ${bgColorClass} rounded-t-lg`}></div>
                            <div className="flex justify-between items-center mb-4 border-b pb-2">
                                <h2 className={`text-xl font-black ${colorClass}`}><i className={`fa-solid ${icon} mr-2`}></i>中清店 {shiftName}戰報</h2>
                                <div className="text-sm font-bold bg-gray-100 px-2 py-1 rounded">Date: {displayDate}</div>
                            </div>

                            <div className="grid grid-cols-3 gap-2 mb-4">
                                <div className="bg-gray-50 p-2 rounded text-center border">
                                    <div className="text-xs text-gray-500">來客數</div>
                                    <div className="text-lg font-bold">{data.orders || 0}</div>
                                </div>
                                <div className="bg-gray-50 p-2 rounded text-center border">
                                    <div className="text-xs text-gray-500">總業績</div>
                                    <div className="text-lg font-bold">${Number(data.revenue).toLocaleString() || 0}</div>
                                </div>
                                <div className="bg-blue-50 p-2 rounded text-center border border-blue-100">
                                    <div className="text-xs text-blue-600">客單價</div>
                                    <div className="text-lg font-bold text-blue-700">${atv.toLocaleString()}</div>
                                </div>
                            </div>

                            <div className="flex-1">
                                <table className="w-full text-sm border-collapse">
                                    <thead>
                                        <tr className="bg-gray-100 text-gray-600">
                                            <th className="p-1.5 border text-left">推廣項目</th>
                                            <th className="p-1.5 border text-right">目標</th>
                                            <th className="p-1.5 border text-right">實際</th>
                                            <th className="p-1.5 border text-right">差異</th>
                                            <th className="p-1.5 border text-right">達成率</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {ITEM_CONFIG.map(item => {
                                            const target = calculateTarget(data, item.id);
                                            const actualNum = Number(data[item.id]) || 0;
                                            const actualDisplay = data[item.id] === '' ? '-' : actualNum;
                                            const gapDisplay = formatGap(data[item.id], target);
                                            const isAmount = item.type === 'amount';
                                            const rate = target > 0 ? Math.round((actualNum / target) * 100) : 0;
                                            
                                            let gapColor = 'text-gray-500';
                                            if(data[item.id] !== '') {
                                                gapColor = (actualNum - target) >= 0 ? 'text-green-600' : 'text-red-500';
                                            }

                                            return (
                                                <tr key={item.id} className="border-b hover:bg-gray-50">
                                                    <td className="p-1.5 font-bold text-gray-700">{item.name} <span className="text-[10px] text-gray-400 font-normal">({settings.rates[item.id]}%)</span></td>
                                                    <td className="p-1.5 text-right text-gray-500">{isAmount ? '$' : ''}{target.toLocaleString()}</td>
                                                    <td className={`p-1.5 text-right font-bold ${data[item.id] !== '' ? 'text-blue-700' : 'text-gray-300'}`}>{isAmount && data[item.id] !== '' ? '$' : ''}{actualDisplay.toLocaleString()}</td>
                                                    <td className={`p-1.5 text-right font-bold ${gapColor}`}>{gapDisplay}</td>
                                                    <td className="p-1.5 text-right font-bold">{data[item.id] !== '' ? `${rate}%` : '-'}</td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-white max-w-6xl mx-auto w-full shadow-lg">
                    {/* 頂部導覽 */}
                    <div className="bg-white px-3 py-2 border-b flex justify-between items-center shrink-0">
                        <h1 className="text-xl font-bold text-gray-800"><i className="fa-solid fa-chart-line text-blue-600 mr-2"></i>中清店戰報系統</h1>
                        <input type="date" className="border p-1 rounded text-sm bg-gray-50" value={currentDate} onChange={(e) => setCurrentDate(e.target.value)} />
                    </div>

                    {/* 導覽列 */}
                    <div className="flex overflow-x-auto border-b border-gray-300 bg-white shadow-sm shrink-0">
                        <button onClick={() => setActiveTab('night')} className={`flex-1 min-w-[70px] py-2 px-1 text-sm md:text-base whitespace-nowrap transition-colors ${activeTab === 'night' ? 'border-b-2 border-gray-800 text-gray-800 font-bold bg-gray-100' : 'text-gray-500 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-moon md:mr-1 block md:inline text-gray-700"></i>夜班
                        </button>
                        <button onClick={() => setActiveTab('morning')} className={`flex-1 min-w-[70px] py-2 px-1 text-sm md:text-base whitespace-nowrap transition-colors ${activeTab === 'morning' ? 'border-b-2 border-orange-500 text-orange-600 font-bold bg-orange-50' : 'text-gray-500 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-sun md:mr-1 block md:inline text-orange-500"></i>早班
                        </button>
                        <button onClick={() => setActiveTab('evening')} className={`flex-1 min-w-[70px] py-2 px-1 text-sm md:text-base whitespace-nowrap transition-colors ${activeTab === 'evening' ? 'border-b-2 border-indigo-500 text-indigo-600 font-bold bg-indigo-50' : 'text-gray-500 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-cloud-sun md:mr-1 block md:inline text-indigo-500"></i>晚班
                        </button>
                        <button onClick={() => setActiveTab('summary')} className={`flex-1 min-w-[70px] py-2 px-1 text-sm md:text-base whitespace-nowrap transition-colors ${activeTab === 'summary' ? 'border-b-2 border-green-500 text-green-700 font-bold bg-green-50' : 'text-gray-500 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-chart-pie md:mr-1 block md:inline text-green-600"></i>累加
                        </button>
                        <button onClick={() => setActiveTab('audit')} className={`flex-1 min-w-[70px] py-2 px-1 text-sm md:text-base whitespace-nowrap transition-colors ${activeTab === 'audit' ? 'border-b-2 border-red-500 text-red-700 font-bold bg-red-50' : 'text-gray-500 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-clipboard-check md:mr-1 block md:inline text-red-600"></i>稽核
                        </button>
                        <button onClick={() => setActiveTab('trend')} className={`flex-1 min-w-[70px] py-2 px-1 text-sm md:text-base whitespace-nowrap transition-colors ${activeTab === 'trend' ? 'border-b-2 border-purple-500 text-purple-700 font-bold bg-purple-50' : 'text-gray-500 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-arrow-trend-up md:mr-1 block md:inline text-purple-600"></i>趨勢
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`flex-1 min-w-[70px] py-2 px-1 text-sm md:text-base whitespace-nowrap transition-colors ${activeTab === 'settings' ? 'border-b-2 border-gray-500 text-gray-700 font-bold bg-gray-100' : 'text-gray-500 hover:bg-gray-50'}`}>
                            <i className="fa-solid fa-gear md:mr-1 block md:inline text-gray-500"></i>設定
                        </button>
                    </div>

                    {/* 頁籤內容區 */}
                    <div className="flex-1 overflow-y-auto bg-gray-50">
                        {activeTab === 'night' && renderShiftTab('night', '夜班', 'fa-moon', 'text-gray-800', 'bg-gray-800')}
                        {activeTab === 'morning' && renderShiftTab('morning', '早班', 'fa-sun', 'text-orange-600', 'bg-orange-500')}
                        {activeTab === 'evening' && renderShiftTab('evening', '晚班', 'fa-cloud-sun', 'text-indigo-600', 'bg-indigo-500')}

                        {/* 三班累加 */}
                        {activeTab === 'summary' && (() => {
                            const { summary, targetDateStr } = getSummaryData();
                            return (
                            <div className="tab-content p-3 h-full overflow-y-auto">
                                <div className="bg-white p-4 rounded-lg shadow border">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h2 className="text-lg font-bold text-green-700"><i className="fa-solid fa-chart-pie mr-2"></i>戰報累加查詢</h2>
                                        
                                        <div className="flex bg-gray-100 rounded-lg p-1">
                                            <button onClick={() => setSummaryMode('day')} className={`px-3 py-1 text-sm rounded ${summaryMode === 'day' ? 'bg-white shadow font-bold text-blue-600' : 'text-gray-500 hover:bg-gray-200'}`}>單日</button>
                                            <button onClick={() => setSummaryMode('month')} className={`px-3 py-1 text-sm rounded ${summaryMode === 'month' ? 'bg-white shadow font-bold text-green-600' : 'text-gray-500 hover:bg-gray-200'}`}>本月累計</button>
                                            <button onClick={() => setSummaryMode('lastMonth')} className={`px-3 py-1 text-sm rounded ${summaryMode === 'lastMonth' ? 'bg-white shadow font-bold text-purple-600' : 'text-gray-500 hover:bg-gray-200'}`}>上月累計</button>
                                        </div>
                                    </div>
                                    <div className="text-center mb-4 text-sm font-bold bg-green-50 text-green-800 py-1 rounded">
                                        目前查詢區間: {targetDateStr}
                                    </div>

                                    <div className="grid grid-cols-3 gap-2 mb-4">
                                        <div className="bg-green-50 p-2 rounded text-center border border-green-100">
                                            <div className="text-xs text-green-800">總來客數</div>
                                            <div className="text-xl font-bold text-green-600">{summary.orders}</div>
                                        </div>
                                        <div className="bg-green-50 p-2 rounded text-center border border-green-100">
                                            <div className="text-xs text-green-800">總業績</div>
                                            <div className="text-xl font-bold text-green-600">${summary.revenue.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-blue-50 p-2 rounded text-center border border-blue-100">
                                            <div className="text-xs text-blue-800">平均客單價</div>
                                            <div className="text-xl font-bold text-blue-600">${summary.atv.toLocaleString()}</div>
                                        </div>
                                    </div>

                                    <table className="w-full text-sm border-collapse">
                                        <thead>
                                            <tr className="bg-gray-100 text-gray-600">
                                                <th className="p-2 border text-left">推廣項目</th>
                                                <th className="p-2 border text-right">目標 <span className="text-[10px] font-normal">(依總數推算)</span></th>
                                                <th className="p-2 border text-right text-blue-600 font-bold">總實際</th>
                                                <th className="p-2 border text-right">總差異</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {ITEM_CONFIG.map(item => {
                                                const totalTarget = calculateTarget(summary, item.id);
                                                const totalActual = summary[item.id];
                                                const isAmount = item.type === 'amount';
                                                
                                                const gap = totalActual - totalTarget;
                                                let gapDisplay = gap;
                                                let gapColor = 'text-gray-500';
                                                if (gap > 0) {
                                                    gapDisplay = `+${gap}`;
                                                    gapColor = 'text-green-600';
                                                } else if (gap < 0) {
                                                    gapColor = 'text-red-500';
                                                }

                                                return (
                                                    <tr key={item.id} className="hover:bg-gray-50 border-b">
                                                        <td className="p-2 font-bold">{item.name}</td>
                                                        <td className="p-2 text-right text-gray-500">{isAmount ? '$' : ''}{totalTarget.toLocaleString()}</td>
                                                        <td className="p-2 text-right font-bold text-blue-600">{isAmount ? '$' : ''}{totalActual.toLocaleString()}</td>
                                                        <td className={`p-2 text-right font-bold ${gapColor}`}>{gapDisplay}</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            );
                        })()}

                        {/* 店長稽核 */}
                        {activeTab === 'audit' && (() => {
                            const auditItems = [
                                { id: 'orders', name: '總來客數', isAmount: false },
                                { id: 'revenue', name: '總業績', isAmount: true },
                                ...ITEM_CONFIG.map(i => ({ id: i.id, name: i.name, isAmount: i.type === 'amount' }))
                            ];

                            // 取得三班系統加總
                            const getSystemSum = (fieldId) => {
                                return ['morning', 'evening', 'night'].reduce((acc, shift) => {
                                    return acc + (Number(currentDayData[shift]?.[fieldId]) || 0);
                                }, 0);
                            };

                            const managerData = currentDayData.manager;

                            return (
                            <div className="tab-content p-3 h-full overflow-y-auto">
                                <div className="bg-white p-4 rounded-lg shadow border max-w-3xl mx-auto">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h2 className="text-lg font-bold text-red-700"><i className="fa-solid fa-clipboard-check mr-2"></i>店長日結稽核</h2>
                                        <div className="text-sm font-bold bg-gray-100 px-3 py-1 rounded">稽核日期: {currentDate}</div>
                                    </div>
                                    
                                    <p className="text-xs text-gray-500 mb-4 bg-red-50 p-2 rounded border border-red-100">
                                        <i className="fa-solid fa-circle-info mr-1"></i>
                                        請於此處填入「今日整天真實結帳資料」。系統會自動比對各班輸入的總和，若「誤差」欄位出現非 0 的紅字，代表三班人員輸入的數字有誤或漏 KEY。
                                    </p>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm border-collapse">
                                            <thead>
                                                <tr className="bg-gray-100 text-gray-700">
                                                    <th className="p-2 border text-left w-1/4">稽核項目</th>
                                                    <th className="p-2 border text-right w-1/4">三班系統加總 <span className="text-[10px] font-normal block text-gray-500">(自動計算)</span></th>
                                                    <th className="p-2 border text-center w-1/4 bg-red-50 text-red-700">店長實際日結 <span className="text-[10px] font-normal block">(請輸入)</span></th>
                                                    <th className="p-2 border text-right w-1/4">整天差異數 <span className="text-[10px] font-normal block text-gray-500">(實際 - 系統)</span></th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {auditItems.map(item => {
                                                    const sysSum = getSystemSum(item.id);
                                                    const managerVal = managerData[item.id];
                                                    const hasInput = managerVal !== '';
                                                    const managerNum = Number(managerVal) || 0;
                                                    
                                                    // 計算誤差: 店長輸入 - 系統加總
                                                    const diff = hasInput ? managerNum - sysSum : null;
                                                    let diffDisplay = '-';
                                                    let diffColor = 'text-gray-300';
                                                    
                                                    if (hasInput) {
                                                        if (diff === 0) {
                                                            diffDisplay = '0 (相符)';
                                                            diffColor = 'text-green-600 bg-green-50';
                                                        } else {
                                                            diffDisplay = diff > 0 ? `+${diff}` : diff;
                                                            diffColor = 'text-red-600 bg-red-50 font-bold';
                                                        }
                                                    }

                                                    return (
                                                        <tr key={item.id} className="border-b hover:bg-gray-50">
                                                            <td className="p-2 font-bold text-gray-700">{item.name}</td>
                                                            <td className="p-2 text-right text-gray-500 bg-gray-50">
                                                                {item.isAmount ? '$' : ''}{sysSum.toLocaleString()}
                                                            </td>
                                                            <td className="p-1 text-center bg-red-50/30">
                                                                <input type="number" 
                                                                    className="w-full max-w-[100px] p-1.5 border border-red-300 rounded text-right text-sm text-red-800 font-bold bg-white focus:ring-2 focus:ring-red-200 outline-none" 
                                                                    value={managerVal} 
                                                                    onChange={(e) => handleShiftChange('manager', item.id, e.target.value)} 
                                                                    placeholder="請輸入..." />
                                                            </td>
                                                            <td className={`p-2 text-right ${diffColor}`}>
                                                                {item.isAmount && hasInput && diff !== 0 ? '$' : ''}{hasInput && diff !== 0 ? diff.toLocaleString() : diffDisplay}
                                                            </td>
                                                        </tr>
                                                    )
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="mt-3 text-xs text-gray-400 text-right">
                                        {isSaving ? <><i className="fa-solid fa-spinner fa-spin mr-1"></i> 儲存中...</> : <><i className="fa-solid fa-cloud-check mr-1 text-green-500"></i> 已雲端同步</>}
                                    </div>
                                </div>
                            </div>
                            );
                        })()}

                        {/* 趨勢圖表 */}
                        {activeTab === 'trend' && (
                            <div className="tab-content p-3 h-full overflow-y-auto flex flex-col">
                                <div className="bg-white p-3 rounded-lg shadow border mb-3 shrink-0">
                                    <div className="flex justify-between items-center mb-2">
                                        <h2 className="text-md font-bold text-purple-700"><i className="fa-solid fa-table mr-2"></i>每日總計明細 <span className="text-xs text-gray-500 font-normal ml-1">(至 {trendMonth.split('-')[1]}/{currentDate.split('-')[2]})</span></h2>
                                        <div className="flex gap-2">
                                            <input type="month" className="border p-1 rounded text-sm bg-gray-50" value={trendMonth} onChange={(e) => setTrendMonth(e.target.value)} />
                                            <select className="border p-1 rounded text-sm bg-white" value={trendShiftFilter} onChange={(e) => setTrendShiftFilter(e.target.value)}>
                                                <option value="all">全部累計</option>
                                                <option value="night">夜班</option>
                                                <option value="morning">早班</option>
                                                <option value="evening">晚班</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <div className="overflow-x-auto w-full">
                                        <table className="text-xs border-collapse w-full">
                                            <thead>
                                                <tr className="bg-gray-100">
                                                    <th className="p-1 border sticky left-0 bg-gray-100 z-10 w-16">日期</th>
                                                    {Array.from({length: getDaysInMonth(trendMonth)}, (_, i) => {
                                                        const isHol = isWeekend(trendMonth, i+1);
                                                        return <th key={i} className={`p-1 border min-w-[25px] text-center ${isHol ? 'text-red-500 bg-red-50' : 'text-gray-600'}`}>{i+1}</th>
                                                    })}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {ITEM_CONFIG.map(item => (
                                                    <tr key={item.id} className="hover:bg-gray-50">
                                                        <td className="p-1 border font-bold text-gray-700 sticky left-0 bg-white z-10">{item.name}</td>
                                                        {Array.from({length: getDaysInMonth(trendMonth)}, (_, i) => {
                                                            const dateStr = `${trendMonth}-${String(i + 1).padStart(2, '0')}`;
                                                            const dayData = dailyRecords[dateStr];
                                                            const isHol = isWeekend(trendMonth, i+1);
                                                            let val = ''; 
                                                            
                                                            if (dayData) {
                                                                if (trendShiftFilter === 'all') {
                                                                    let sum = 0;
                                                                    let hasData = false;
                                                                    ['night', 'morning', 'evening'].forEach(s => {
                                                                        if(dayData[s] && dayData[s][item.id] !== '') {
                                                                            sum += Number(dayData[s][item.id]);
                                                                            hasData = true;
                                                                        }
                                                                    });
                                                                    if(hasData) val = sum;
                                                                } else if(dayData[trendShiftFilter] && dayData[trendShiftFilter][item.id] !== '') {
                                                                    val = Number(dayData[trendShiftFilter][item.id]);
                                                                }
                                                            }
                                                            return <td key={i} className={`p-1 border text-center ${isHol ? 'bg-red-50/30' : ''} ${val !== '' ? 'font-semibold text-blue-600' : 'text-gray-300'}`}>{val}</td>
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="bg-white p-3 rounded-lg shadow border flex-1 min-h-[250px] shrink-0 flex flex-col">
                                    <div className="flex justify-between items-center mb-2">
                                        <h2 className="text-md font-bold text-gray-700"><i className="fa-solid fa-chart-line mr-2"></i>趨勢折線圖</h2>
                                        <div className="flex flex-wrap gap-2 text-xs">
                                            {ITEM_CONFIG.map(item => (
                                                <label key={item.id} className={`flex items-center cursor-pointer p-1 border rounded ${chartTargetItem === item.id ? 'bg-blue-50 border-blue-300 font-bold' : 'bg-gray-50 hover:bg-gray-100'}`}>
                                                    <input 
                                                        type="radio" 
                                                        name="chartTarget"
                                                        value={item.id} 
                                                        checked={chartTargetItem === item.id}
                                                        onChange={(e) => setChartTargetItem(e.target.value)} 
                                                        className="mr-1"
                                                    />
                                                    <span style={{color: item.color}}>{item.name}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="relative flex-1 w-full h-full">
                                        <canvas id="trendChart"></canvas>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 店長設定 */}
                        {activeTab === 'settings' && (
                            <div className="tab-content p-4 h-full overflow-y-auto">
                                <div className="bg-white p-5 rounded-lg shadow border max-w-2xl mx-auto">
                                    <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i className="fa-solid fa-sliders mr-2"></i>系統參數設定 <span className="text-xs font-normal text-gray-500">(雲端同步)</span></h2>
                                    
                                    <table className="w-full text-sm border-collapse mb-6">
                                        <thead>
                                            <tr className="bg-gray-100">
                                                <th className="p-2 border text-left">推廣項目</th>
                                                <th className="p-2 border text-center">目標設定 (%)</th>
                                                <th className="p-2 border text-center">達成配分</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {ITEM_CONFIG.map(item => (
                                                <tr key={item.id} className="border-b">
                                                    <td className="p-2 font-bold text-gray-700">{item.name}</td>
                                                    <td className="p-2 text-center">
                                                        <input type="number" className="w-16 p-1 border rounded text-center bg-gray-50" 
                                                            value={settings.rates[item.id]} onChange={(e) => handleSettingChange('rates', item.id, e.target.value)} /> %
                                                    </td>
                                                    <td className="p-2 text-center">
                                                        <input type="number" className="w-16 p-1 border rounded text-center bg-gray-50" 
                                                            value={settings.scores[item.id]} onChange={(e) => handleSettingChange('scores', item.id, e.target.value)} /> 分
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>

                                    <div className="bg-gray-50 p-4 rounded border">
                                        <label className="block text-sm font-bold text-gray-700 mb-2">基礎營運分數 (預設55分)</label>
                                        <p className="text-xs text-gray-500 mb-2">此分數加上上方各項達成配分，用於計算是否達到門店及格標準(65分)。</p>
                                        <input type="number" className="w-24 p-2 border rounded text-center bg-white" 
                                            value={settings.baseScore} onChange={(e) => handleSettingChange('baseScore', 'value', e.target.value)} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
